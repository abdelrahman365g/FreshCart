<div
  class="grid grid-cols-1 md:grid-cols-12 gap-4 p-4 md:px-6 md:py-5 items-center hover:bg-gray-50/50 transition-colors duration-300"
>
  <div class="md:col-span-6 flex items-center gap-4">
    <a
      class="w-20 h-20 rounded-xl bg-gray-50 border border-gray-100 overflow-hidden shrink-0 group"
      [routerLink]="['/products', product()?._id]"
    >
      <img
        [src]="product()?.imageCover"
        class="w-full h-full object-contain p-2 transition-transform duration-300 group-hover:scale-110"
      />
    </a>

    <div class="min-w-0">
      <a
        class="font-medium text-gray-900 hover:text-emerald-600 transition-colors duration-200 line-clamp-2"
        [routerLink]="['/products', product()?._id]"
      >
        {{ product()?.title }}
      </a>

      <p class="text-sm text-gray-400 mt-1">
        {{ product()?.category?.name }}
      </p>
    </div>
  </div>

  <div class="md:col-span-2 flex md:justify-center items-center gap-2">
    <span class="md:hidden text-sm text-gray-500">Price:</span>

    <div class="text-right md:text-center">
      <div class="font-semibold text-gray-900">
        {{
          product()?.priceAfterDiscount
            ? (product()?.priceAfterDiscount | currency: 'EGP')
            : (product()?.price | currency: 'EGP')
        }}
      </div>

      @if ((product()?.priceAfterDiscount ?? 0) > 0) {
        <div class="text-sm text-gray-400 line-through">
          {{ product()?.price | currency: 'EGP' }}
        </div>
      }
    </div>
  </div>

  <div class="md:col-span-2 flex md:justify-center">
    <span class="md:hidden text-sm text-gray-500 mr-2">Status:</span>

    <span
      class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700"
    >
      <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
      In Stock
    </span>
  </div>

  <div class="md:col-span-2 flex items-center gap-2 md:justify-center">
    <button
      class="flex-1 md:flex-none inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-300 bg-emerald-600 text-white hover:bg-emerald-700 hover:scale-105 disabled:bg-emerald-900 disabled:hover:bg-emerald-800 disabled:hover:scale-100"
      (click)="addToCart()"
      [disabled]="added()"
    >
      @if (!added()) {
        <i class="fa-solid fa-cart-shopping text-xs"></i>
        <span class="md:hidden lg:inline">Add to Cart</span>
      } @else {
        <i class="fa-solid fa-check text-xs"></i>
        <span class="md:hidden lg:inline">Added to Cart</span>
      }
    </button>

    <button
      class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-400 hover:text-red-500 hover:border-red-200 hover:bg-red-50 transition-all duration-200"
      (click)="remove()"
    >
      <i class="fa-solid fa-trash text-sm"></i>
    </button>
  </div>
</div>
