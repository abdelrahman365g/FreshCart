            <div class="mt-4 flex gap-3">
              <a

              >
                Shop Now
              </a>
              <a
                href="/deals"

    <div class="hidden duration-700 ease-in-out" data-carousel-item>

        <div class="w-full h-full bg-linear-to-r from-green-500/60 to-green-400/50">
          <div class="container mx-auto px-4 h-full flex flex-col justify-center">
            <h2 class="text-white text-3xl font-bold mb-4 max-w-96">Premium Quality Guaranteed</h2>
            <p class="text-white/90">Fresh from farm to your table</p>
            <div class="mt-4 flex gap-3">
              <a
                href="/products"
                class="bg-white text-green-600 hover:bg-gray-100 hover:scale-105 transition-all duration-300 inline-block px-6 py-2 rounded-lg font-semibold"

              </a>
              <a

        </div>

    <div class="hidden duration-700 ease-in-out" data-carousel-item>
      <div
        class="absolute block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2 h-100 bg-cover bg-center bg-slide"
      >
        <div class="w-full h-full bg-linear-to-r from-green-500/60 to-green-400/50">
          <div class="container mx-auto px-4 h-full flex flex-col justify-center">
            <h2 class="text-white text-3xl font-bold mb-4 max-w-96">Fast & Free Delivery</h2>

    <button
      type="button"
      class="w-3 h-3 rounded-full bg-white/50 hover:bg-white transition-all duration-300"
      data-carousel-slide-to="0"
      aria-current="false"
      aria-label="Slide 1"
    ></button>
    <button
      type="button"
      class="w-3 h-3 rounded-full bg-white/50 hover:bg-white transition-all duration-300"
      data-carousel-slide-to="1"
      aria-current="false"
      aria-label="Slide 2"

      type="button"

      data-carousel-slide-to="2"

  <button

  >

  <button
    type="button"
    class="absolute top-0 inset-e-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none"

  >

      class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none"
