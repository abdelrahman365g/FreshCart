<div
  class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-linear-to-b from-gray-50 to-white"
>
  <div
    class="absolute top-0 left-0 w-96 h-96 bg-emerald-100/30 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"
  ></div>
  <div
    class="absolute bottom-0 right-0 w-96 h-96 bg-blue-100/20 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"
  ></div>
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-150 h-150 bg-emerald-50/20 rounded-full blur-3xl"
  ></div>

  <div class="relative z-10 max-w-xl w-full">
    <div class="flex justify-center mb-10">
      <div class="relative">
        <div
          class="absolute inset-0 w-64 h-52 sm:w-72 sm:h-60 bg-emerald-100/50 rounded-4xl blur-2xl"
        ></div>
        <div class="relative w-64 h-52 sm:w-72 sm:h-60">
          <div
            class="absolute inset-x-0 top-4 mx-auto w-52 h-40 sm:w-60 sm:h-44 bg-white rounded-3xl shadow-xl shadow-gray-200/60 border border-gray-100 flex items-center justify-center overflow-hidden"
          >
            <div
              class="absolute inset-0 bg-linear-to-br from-emerald-50/80 via-transparent to-emerald-100/40"
            ></div>
            <i class="fa-solid fa-rocket text-7xl text-emerald-500"></i>
          </div>
          <div
            class="absolute -bottom-1 left-1/2 -translate-x-1/2 flex items-center justify-center gap-4"
          >
            <div class="w-2.5 h-2.5 rounded-full bg-emerald-400"></div>
            <div class="w-8 h-4 border-b-[3px] border-emerald-400 rounded-b-full"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-emerald-400"></div>
          </div>
          <div class="absolute -top-2 -right-2 sm:top-0 sm:right-0">
            <div class="relative">
              <div class="absolute -inset-2 rounded-full bg-white shadow-lg"></div>
              <div
                class="relative w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-linear-to-br from-emerald-500 to-emerald-600 flex items-center justify-center shadow-lg shadow-emerald-500/40"
              >
                <i class="fa-regular fa-hourglass-half text-2xl text-white"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mb-6">
      <span
        class="inline-block px-4 py-1.5 bg-emerald-100 text-emerald-700 text-sm font-semibold rounded-full mb-4"
      >
        <i class="fa-regular fa-clock mr-1"></i> Coming Soon
      </span>
      <h1 class="text-4xl sm:text-5xl font-black text-gray-900 mb-4 tracking-tight">
        Feature in Development
      </h1>
      <p class="text-gray-500 text-lg leading-relaxed">
        We're working hard to bring you something amazing. This feature will be available shortly.
      </p>
    </div>

    <div class="mb-10 max-w-md mx-auto">
      <div class="flex justify-between text-sm text-gray-600 mb-2">
        <span>Development Progress</span>
        <span class="font-semibold text-emerald-600">50%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
        <div
          class="bg-linear-to-r from-emerald-500 to-emerald-600 h-2.5 rounded-full transition-all duration-1000"
          style="width: 50%"
        ></div>
      </div>
      <div class="flex justify-between text-xs text-gray-400 mt-2">
        <span>Planning</span>
        <span>Design</span>
        <span>Development</span>
        <span>Testing</span>
        <span>Launch</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-10 max-w-md mx-auto">
      <div
        class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-gray-100 shadow-sm"
      >
        <i class="fa-solid fa-bolt text-emerald-500 text-sm"></i>
        <span class="text-xs text-gray-700">Lightning Fast</span>
      </div>
      <div
        class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-gray-100 shadow-sm"
      >
        <i class="fa-solid fa-shield-halved text-emerald-500 text-sm"></i>
        <span class="text-xs text-gray-700">Secure & Safe</span>
      </div>
      <div
        class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-gray-100 shadow-sm"
      >
        <i class="fa-solid fa-mobile-alt text-emerald-500 text-sm"></i>
        <span class="text-xs text-gray-700">Mobile Ready</span>
      </div>
      <div
        class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-gray-100 shadow-sm"
      >
        <i class="fa-regular fa-clock text-emerald-500 text-sm"></i>
        <span class="text-xs text-gray-700">24/7 Support</span>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">
      <a
        class="group w-full sm:w-auto inline-flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white py-4 px-8 rounded-2xl font-bold text-lg transition-all duration-300 shadow-lg shadow-emerald-600/25 hover:shadow-xl hover:shadow-emerald-600/30 hover:-translate-y-1"
        routerLink="/"
      >
        <i class="fa-solid fa-house"></i>
        Go to Homepage
      </a>
      <button
        class="group w-full sm:w-auto inline-flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 py-4 px-8 rounded-2xl font-bold text-lg transition-all duration-300 shadow-md hover:shadow-lg border border-gray-200 hover:-translate-y-1"
        (click)="goBack()"
      >
        <i class="fa-solid fa-arrow-left"></i>
        Go Back
      </button>
    </div>
  </div>
</div>
