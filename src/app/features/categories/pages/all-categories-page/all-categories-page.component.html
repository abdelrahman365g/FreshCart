<div class="min-h-screen bg-gray-50/50">
  <div class="bg-linear-to-br from-emerald-600 via-emerald-500 to-emerald-400 text-white">
    <div class="container mx-auto px-4 py-12 sm:py-16">
      <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
        <a class="hover:text-white transition-colors duration-200" href="/">
          <i class="fa-solid fa-home mr-1"></i> Home
        </a>
        <span class="text-white/40">/</span>
        <span class="text-white font-medium">Categories</span>
      </nav>

      <div class="flex items-center gap-5">
        <div
          class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30"
        >
          <i class="fa-solid fa-layer-group text-3xl"></i>
        </div>
        <div>
          <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All Categories</h1>
          <p class="text-white/80 mt-1">Browse our wide range of product categories</p>
        </div>
      </div>
    </div>
  </div>

  <div class="container mx-auto px-4 py-10">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
      @if (!isLoading()) {
        @for (category of categories(); track $index) {
          <app-category-card [category]="category"></app-category-card>
        } @empty {
          <div class="text-center py-20 col-span-full">
            <div
              class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5"
            >
              <i class="fa-solid fa-layer-group text-3xl text-gray-400"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">No Categories Found</h3>
            <p class="text-gray-500">Categories will appear here once available.</p>
          </div>
        }
      } @else {
        <div class="text-center py-20 col-span-full">
          <i class="fas fa-spinner fa-spin text-primary-500 text-2xl"></i>
          <h3 class="text-lg font-bold text-primary-500 mb-2">Loading Categories...</h3>
        </div>
      }
    </div>
  </div>
</div>
