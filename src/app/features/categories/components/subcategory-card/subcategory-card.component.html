<a
  class="group block h-full bg-white rounded-2xl border border-gray-100 p-6 shadow-sm hover:shadow-xl hover:border-emerald-200 transition-all duration-300 hover:-translate-y-1"
  routerLink="/products"
  [queryParams]="{ subcategory: subcategory()?._id }"
>
  <div
    class="w-14 h-14 rounded-xl bg-emerald-50 flex items-center justify-center mb-4 group-hover:bg-emerald-100 transition-colors duration-300"
  >
    <i class="fa-solid fa-folder-open text-2xl text-emerald-600"></i>
  </div>

  <h3
    class="font-bold text-gray-900 text-lg group-hover:text-emerald-600 transition-colors duration-300 mb-2"
  >
    {{ subcategory()?.name }}
  </h3>

  <div
    class="flex items-center gap-2 text-sm text-emerald-600 opacity-0 group-hover:opacity-100 transition-all duration-300"
  >
    <span>Browse Products</span>
    <i class="fa-solid fa-arrow-right text-xs"></i>
  </div>
</a>
